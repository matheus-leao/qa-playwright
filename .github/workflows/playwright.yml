name: Playwright CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: E2E Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      PRACTICE_PREVIEW_URL: ${{ secrets.PRACTICE_PREVIEW_URL }}
      PRACTICE_WRITING_URL: ${{ secrets.PRACTICE_WRITING_URL }}
      PRACTICE_SPEAKING_URL: ${{ secrets.PRACTICE_SPEAKING_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate required secrets
        run: |
          test -n "$BASE_URL" || (echo "Missing secret: BASE_URL" && exit 1)
          test -n "$PRACTICE_PREVIEW_URL" || (echo "Missing secret: PRACTICE_PREVIEW_URL" && exit 1)
          test -n "$PRACTICE_WRITING_URL" || (echo "Missing secret: PRACTICE_WRITING_URL" && exit 1)

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  deploy-report:
    name: Deploy Playwright Report
    if: ${{ github.event_name != 'pull_request' }}
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: ./playwright-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
